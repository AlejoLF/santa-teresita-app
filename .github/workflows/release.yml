name: Release Desktop

# Se dispara cuando se pushea un tag `v*` (ej. v1.26.0). Buildea el desktop
# .exe + .zip + latest.yml en Windows y los sube como artefactos al GitHub
# Release que matchea el tag.
#
# El primer release v1.25.0 se hace MANUAL desde la PC del dev (con
# `pnpm --filter @sta/desktop run release` y GH_TOKEN local) porque el flow
# automático requiere que electron-updater esté ya instalado en el cliente.
# A partir de v1.26 las releases salen solas con tag push.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # necesario para subir assets al release

jobs:
  build-desktop:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        # No `version:` aquí — el action lo lee automáticamente de
        # `packageManager` en package.json (pnpm@9.12.0). Si especificáramos
        # ambos, el action falla con "Multiple versions of pnpm specified".
        uses: pnpm/action-setup@v4

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sta/db run generate

      - name: Download VC++ Redistributable (bundled in NSIS installer)
        working-directory: apps/desktop
        run: pnpm run ensure:vcredist

      - name: Build resources (api + seed + web + agent)
        working-directory: apps/desktop
        run: pnpm run build:resources

      # Compilamos el .exe y .zip SIN publicar. Separamos el build del upload
      # porque el publish nativo de electron-builder colgaba sin loggear nada
      # al subir el .exe de 367MB (v1.25/v1.26/v1.27 fallaban acá), y debug
      # logging no aclaraba la causa.
      - name: Build Windows installer + ZIP (no publish)
        working-directory: apps/desktop
        env:
          # Logs verbosos de electron-builder para que el próximo fail (si
          # ocurre) tenga contexto. No afecta perf.
          DEBUG: electron-builder
        run: pnpm exec electron-builder --win --publish never

      # Listamos los assets generados para que el log de CI muestre los path
      # exactos antes del upload (debug helper).
      - name: List built artifacts
        working-directory: apps/desktop
        shell: pwsh
        run: |
          Write-Output "── Built artifacts ──"
          Get-ChildItem dist -File | Select-Object Name, Length, LastWriteTime | Format-Table -AutoSize

      # Upload via gh CLI — más robusto que el publisher embebido de
      # electron-builder para archivos grandes (gh maneja retries y streaming
      # multipart de forma transparente). `--clobber` reemplaza assets si la
      # release ya existe (caso re-run del workflow sobre el mismo tag).
      - name: Upload assets to GitHub Release
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          Write-Output "Tag: $tag"

          # Crear la release si no existe (gh upload requiere release previa).
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Output "Release no existe — creándola"
            gh release create $tag --title $tag --notes "Auto-generated by CI. Edit notes manually after publish."
          }

          gh release upload $tag `
            "dist/SantaTeresita-Setup-$($tag.TrimStart('v')).exe" `
            "dist/SantaTeresita-Setup-$($tag.TrimStart('v')).exe.blockmap" `
            "dist/SantaTeresita-Setup-$($tag.TrimStart('v')).zip" `
            "dist/latest.yml" `
            --clobber
